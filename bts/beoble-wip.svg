<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3a7bd5" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#3a7bd5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7b3ad5" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#7b3ad5" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="blur8">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>
  <rect width="1280" height="720" fill="#06060e"/>

  <!-- Background glow blobs -->
  <ellipse cx="400" cy="360" rx="300" ry="250" fill="url(#glow1)" filter="url(#blur8)"/>
  <ellipse cx="900" cy="300" rx="250" ry="200" fill="url(#glow2)" filter="url(#blur8)"/>

  <!-- Main hero sphere — WIP composite -->
  <circle cx="640" cy="350" r="195" fill="#08080e" opacity="0.95"/>

  <!-- Metallic liquid surface -->
  <circle cx="640" cy="350" r="192" fill="none" stroke="#3a7bd5" stroke-width="0.5" opacity="0.3"/>

  <!-- Electric blue glow surface -->
  <radialGradient id="metallic" cx="35%" cy="30%" r="65%" gradientUnits="objectBoundingBox">
    <stop offset="0%" stop-color="#4a8eff" stop-opacity="0.15"/>
    <stop offset="60%" stop-color="#0a0a1e" stop-opacity="0.8"/>
    <stop offset="100%" stop-color="#000010" stop-opacity="1"/>
  </radialGradient>
  <circle cx="640" cy="350" r="192" fill="url(#metallic)"/>

  <!-- Specular hotspot -->
  <ellipse cx="590" cy="295" rx="40" ry="28" fill="#4a8eff" opacity="0.25" filter="url(#blur2)"/>
  <ellipse cx="578" cy="285" rx="16" ry="11" fill="#a0c8ff" opacity="0.4" filter="url(#blur2)"/>

  <!-- Light streaks -->
  <line x1="445" y1="350" x2="640" y2="350" stroke="#3a7bd5" stroke-width="0.5" opacity="0.2"/>
  <ellipse cx="640" cy="350" rx="192" ry="55" fill="none" stroke="#3a7bd5" stroke-width="0.4" opacity="0.15"/>
  <ellipse cx="640" cy="350" rx="55" ry="192" fill="none" stroke="#7b3ad5" stroke-width="0.4" opacity="0.1"/>

  <!-- Rim light -->
  <circle cx="640" cy="350" r="192" fill="none" stroke="#3a7bd5" stroke-width="2" opacity="0.2"/>

  <!-- After Effects layer panel simulation -->
  <rect x="0" y="560" width="260" height="160" fill="#1a1a1a" opacity="0.85"/>
  <text x="10" y="577" fill="#888" font-family="monospace" font-size="9" letter-spacing="1">LAYERS</text>
  <rect x="0" y="580" width="260" height="1" fill="#333"/>
  <g font-family="monospace" font-size="9">
    <rect x="5" y="584" width="8" height="8" fill="#4a9eff" opacity="0.8" rx="1"/>
    <text x="18" y="592" fill="#aaa">Chromatic Aberration</text>
    <rect x="5" y="598" width="8" height="8" fill="#9f4aff" opacity="0.8" rx="1"/>
    <text x="18" y="606" fill="#aaa">Glow.comp</text>
    <rect x="5" y="612" width="8" height="8" fill="#ff9f4a" opacity="0.8" rx="1"/>
    <text x="18" y="620" fill="#aaa">Main Render Pass</text>
    <rect x="5" y="626" width="8" height="8" fill="#4aff9f" opacity="0.6" rx="1"/>
    <text x="18" y="634" fill="#777">Reflection Pass</text>
    <rect x="5" y="640" width="8" height="8" fill="#ffff4a" opacity="0.6" rx="1"/>
    <text x="18" y="648" fill="#777">Depth of Field</text>
    <rect x="5" y="654" width="8" height="8" fill="#ff4a4a" opacity="0.5" rx="1"/>
    <text x="18" y="662" fill="#666">Occlusion</text>
    <rect x="5" y="668" width="8" height="8" fill="#4affff" opacity="0.5" rx="1"/>
    <text x="18" y="676" fill="#666">Background</text>
  </g>

  <!-- Toolbar -->
  <rect x="0" y="0" width="1280" height="30" fill="#0d0d0d"/>
  <text x="12" y="20" fill="#888" font-family="monospace" font-size="10" letter-spacing="1">AFTER EFFECTS · WIP COMPOSITE · MULTI-PASS · BEOBLE 2.0</text>
  <rect x="1180" y="6" width="80" height="18" rx="3" fill="#3a7bd5" opacity="0.8"/>
  <text x="1190" y="19" fill="#fff" font-family="monospace" font-size="9">WIP v07</text>

  <!-- Label -->
  <rect x="0" y="688" width="1280" height="32" fill="#080808" opacity="0.9"/>
  <text x="24" y="708" fill="#555" font-family="monospace" font-size="11" letter-spacing="2">AFTER EFFECTS · WIP COMPOSITE · MULTI-PASS RENDER</text>
</svg>
