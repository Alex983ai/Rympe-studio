<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <radialGradient id="clay" cx="42%" cy="38%" r="55%">
      <stop offset="0%" stop-color="#c8a882"/>
      <stop offset="40%" stop-color="#9a7a5a"/>
      <stop offset="100%" stop-color="#2a1e14"/>
    </radialGradient>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a1410"/>
      <stop offset="100%" stop-color="#080808"/>
    </radialGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <!-- Soft rim light -->
  <ellipse cx="640" cy="360" rx="280" ry="280" fill="#c8a882" opacity="0.04"/>
  <!-- Clay sphere body -->
  <circle cx="640" cy="360" r="220" fill="url(#clay)"/>
  <!-- Specular highlight -->
  <ellipse cx="580" cy="295" rx="55" ry="38" fill="#f5e6d0" opacity="0.45" filter="url(#soft)"/>
  <ellipse cx="568" cy="288" rx="22" ry="15" fill="#ffffff" opacity="0.35" filter="url(#soft)"/>
  <!-- Rim light edge -->
  <circle cx="640" cy="360" r="220" fill="none" stroke="#8a6a40" stroke-width="1.5" opacity="0.4"/>
  <!-- Shadow on ground -->
  <ellipse cx="640" cy="610" rx="190" ry="30" fill="#000" opacity="0.5" filter="url(#soft)"/>
  <!-- Render info bar -->
  <rect x="0" y="0" width="1280" height="32" fill="#0d0d0d" opacity="0.95"/>
  <text x="12" y="21" fill="#888" font-family="monospace" font-size="10" letter-spacing="1">REDSHIFT · CLAY PASS · 4096×2304 · BEOBLE 2.0</text>
  <text x="1100" y="21" fill="#3a7bd5" font-family="monospace" font-size="10">RENDER DONE</text>
  <!-- Label -->
  <rect x="0" y="688" width="1280" height="32" fill="#080808" opacity="0.9"/>
  <text x="24" y="708" fill="#555" font-family="monospace" font-size="11" letter-spacing="2">REDSHIFT · CLAY RENDER · MATERIAL TEST</text>
</svg>
