  <text x="746" y="284" fill="#aa9900" font-family="monospace" font-size="9">Out</text>

  <!-- Node: Output -->
  <rect x="860" y="240" width="140" height="80" rx="6" fill="#1e1e0e" stroke="#5a5a1a" stroke-width="1.5"/>
  <rect x="860" y="240" width="140" height="28" rx="6" fill="#3a3a0a"/>
  <rect x="860" y="262" width="140" height="6" rx="0" fill="#3a3a0a"/>
  <text x="875" y="259" fill="#cccc44" font-family="monospace" font-size="11" font-weight="bold">Output</text>
  <circle cx="860" cy="286" r="5" fill="#ffd700"/>
  <text x="872" y="290" fill="#666" font-family="monospace" font-size="9">Surface</text>

  <!-- Connections -->
  <path d="M 260 252 C 300 252 300 186 340 186" fill="none" stroke="#4aff9f" stroke-width="1.5" opacity="0.7"/>
  <path d="M 260 272 C 310 272 310 334 340 334" fill="none" stroke="#4a9eff" stroke-width="1.5" opacity="0.7"/>
  <path d="M 500 186 C 540 186 540 248 580 248" fill="none" stroke="#4aff9f" stroke-width="1.5" opacity="0.7"/>
  <path d="M 500 343 C 540 343 540 284 580 284" fill="none" stroke="#ff4a4a" stroke-width="1.5" opacity="0.7"/>
  <path d="M 780 280 C 820 280 820 280 860 280" fill="none" stroke="#ffd700" stroke-width="1.5" opacity="0.7"/>

  <!-- Toolbar at top -->
  <rect x="0" y="0" width="1280" height="30" fill="#0d0d0d"/>
  <text x="12" y="20" fill="#888" font-family="monospace" font-size="10" letter-spacing="1">REDSHIFT · NODE EDITOR · SHADER GRAPH · BEOBLE 2.0</text>

  <!-- Label -->
  <rect x="0" y="688" width="1280" height="32" fill="#080808" opacity="0.9"/>
  <text x="24" y="708" fill="#555" font-family="monospace" font-size="11" letter-spacing="2">REDSHIFT SHADER GRAPH · LOOK DEVELOPMENT</text>
</svg>
