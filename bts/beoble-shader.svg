  <rect x="580" y="200" width="200" height="28" rx="6" fill="#2d2d2d"/>
  <rect x="580" y="222" width="200" height="6" rx="0" fill="#2d2d2d"/>
  <text x="595" y="219" fill="#cccccc" font-family="monospace" font-size="11" font-weight="bold">Standard Material</text>
  <circle cx="580" cy="248" r="5" fill="#4a9eff"/>
  <circle cx="580" cy="266" r="5" fill="#4a9eff"/>
  <circle cx="580" cy="284" r="5" fill="#4a9eff"/>
  <circle cx="580" cy="302" r="5" fill="#4a9eff"/>
  <circle cx="580" cy="320" r="5" fill="#4a9eff"/>
  <circle cx="780" cy="280" r="5" fill="#ffd700"/>
  <text x="592" y="252" fill="#666" font-family="monospace" font-size="9">Base Color</text>
  <text x="592" y="270" fill="#666" font-family="monospace" font-size="9">Roughness</text>
  <text x="592" y="288" fill="#666" font-family="monospace" font-size="9">Metalness</text>
  <text x="592" y="306" fill="#666" font-family="monospace" font-size="9">Normal</text>
