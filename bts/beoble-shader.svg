  <g fill="#222" opacity="0.8">
    <rect x="0" y="0" width="1280" height="720" fill="none"/>
  </g>
  <!-- Dot grid pattern via rects -->
  <g fill="#2a2a2a">
    <rect x="40" y="40" width="2" height="2"/> <rect x="80" y="40" width="2" height="2"/> <rect x="120" y="40" width="2" height="2"/> <rect x="160" y="40" width="2" height="2"/> <rect x="200" y="40" width="2" height="2"/> <rect x="240" y="40" width="2" height="2"/> <rect x="280" y="40" width="2" height="2"/> <rect x="320" y="40" width="2" height="2"/> <rect x="360" y="40" width="2" height="2"/> <rect x="400" y="40" width="2" height="2"/>
    <rect x="40" y="80" width="2" height="2"/> <rect x="80" y="80" width="2" height="2"/> <rect x="120" y="80" width="2" height="2"/> <rect x="160" y="80" width="2" height="2"/> <rect x="200" y="80" width="2" height="2"/> <rect x="240" y="80" width="2" height="2"/> <rect x="280" y="80" width="2" height="2"/> <rect x="320" y="80" width="2" height="2"/> <rect x="360" y="80" width="2" height="2"/> <rect x="400" y="80" width="2" height="2"/>
  </g>

  <!-- Shader nodes -->
  <!-- Node: Texture Sample -->
  <rect x="80" y="200" width="180" height="100" rx="6" fill="#1e1e2e" stroke="#3a3a5a" stroke-width="1.5"/>
  <rect x="80" y="200" width="180" height="28" rx="6" fill="#2a2a4a"/>
  <rect x="80" y="222" width="180" height="6" rx="0" fill="#2a2a4a"/>
  <text x="95" y="219" fill="#8888cc" font-family="monospace" font-size="11" font-weight="bold">Texture Sample</text>
  <circle cx="80" cy="252" r="5" fill="#4a9eff"/>
  <circle cx="80" cy="272" r="5" fill="#4a9eff"/>
  <circle cx="260" cy="252" r="5" fill="#ff9f4a"/>
  <circle cx="260" cy="272" r="5" fill="#ff9f4a"/>
  <text x="92" y="256" fill="#666" font-family="monospace" font-size="9">UV</text>
  <text x="92" y="276" fill="#666" font-family="monospace" font-size="9">Sampler</text>
  <text x="210" y="256" fill="#666" font-family="monospace" font-size="9">RGBA</text>
  <text x="210" y="276" fill="#666" font-family="monospace" font-size="9">Alpha</text>

  <!-- Node: Fresnel -->
  <rect x="340" y="140" width="160" height="90" rx="6" fill="#1e2a1e" stroke="#3a5a3a" stroke-width="1.5"/>
  <rect x="340" y="140" width="160" height="28" rx="6" fill="#2a4a2a"/>
  <rect x="340" y="162" width="160" height="6" rx="0" fill="#2a4a2a"/>
  <text x="355" y="159" fill="#88cc88" font-family="monospace" font-size="11" font-weight="bold">Fresnel</text>
  <circle cx="340" cy="186" r="5" fill="#4a9eff"/>
  <circle cx="500" cy="186" r="5" fill="#4aff9f"/>
  <circle cx="500" cy="206" r="5" fill="#4aff9f"/>
  <text x="352" y="190" fill="#666" font-family="monospace" font-size="9">IOR</text>
  <text x="466" y="190" fill="#666" font-family="monospace" font-size="9">Out</text>
  <text x="460" y="210" fill="#666" font-family="monospace" font-size="9">Mask</text>

  <!-- Node: Multiply -->
  <rect x="340" y="290" width="160" height="80" rx="6" fill="#2a1e1e" stroke="#5a3a3a" stroke-width="1.5"/>
